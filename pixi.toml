[workspace]
authors = ["Dylan Mordaunt <Dylan.Mordaunt@health.nsw.gov.au>"]
channels = ["conda-forge"]
name = "hpo-translations"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
sort-all = { cmd = "python -u scripts/process_translations.py sort-all", env = { PYTHONUTF8 = "1" } }
clean-all = { cmd = "python -u scripts/process_translations.py clean-all", env = { PYTHONUTF8 = "1" } }
validate-all = { cmd = "python -u scripts/process_translations.py validate-all", env = { PYTHONUTF8 = "1" } }
qc = { cmd = "python -u scripts/process_translations.py validate-all", env = { PYTHONUTF8 = "1" } }
update = { depends-on = ["sort-all", "clean-all", "validate-all"] }

[dependencies]
python = ">=3.14.6,<3.15"
setuptools = ">=82.0.1,<83"
ruff = ">=0.15.18,<0.16"
vale = ">=3.15.1,<4"
[pypi-dependencies]
babelon = ">=0.3.6"
tsvalid = ">=0.0.5"
curies = ">=0.7.7"
linkml = ">=1.11.1,<2"
linkml-runtime = ">=1.11.1,<2"

