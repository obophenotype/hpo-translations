name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate docs
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Check documentation prose
        run: pixi run vale-check

  deploy:
    name: Deploy docs
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    needs: validate
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
          cache-write: true

      - name: Deploy docs
        run: pixi exec --with mkdocs-material --with pymdown-extensions mkdocs gh-deploy --force --strict
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
